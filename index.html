<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>SE Team Dashboard · Sprout</title>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --mushroom-50:#fafaf9;--mushroom-100:#f4f4f2;--mushroom-200:#e8e8e4;
  --mushroom-300:#d3d3cc;--mushroom-400:#b0b0a6;--mushroom-500:#8c8c80;
  --mushroom-600:#6b6b60;--mushroom-700:#555550;--mushroom-800:#3d3d38;
  --mushroom-900:#272724;--mushroom-950:#141412;
  --kangkong-50:#f0faf0;--kangkong-100:#dcf5dc;--kangkong-200:#b8ecb8;
  --kangkong-300:#86db86;--kangkong-400:#52c222;--kangkong-500:#2fa82f;
  --kangkong-600:#228722;--kangkong-700:#1d6e1d;--kangkong-800:#165216;
  --kangkong-900:#0e360e;--kangkong-950:#071807;
  --blueberry-100:#dbeafe;--blueberry-500:#3b82f6;--blueberry-600:#2563eb;
  --tomato-100:#fee2e2;--tomato-500:#ef4444;--tomato-600:#dc2626;
  --mango-100:#fef9c3;--mango-500:#eab308;--mango-600:#ca8a04;
  --carrot-100:#ffedd5;--carrot-500:#f97316;
  --wintermelon-100:#ccfbf1;--wintermelon-600:#0d9488;
  --lavender-100:#ede9fe;--lavender-600:#7c3aed;
  --sb-bg:#0e360e;--sb-bg2:#165216;
  --sb-text:rgba(255,255,255,.72);--sb-text-active:#fff;
  --sb-section:rgba(255,255,255,.38);--sb-hover:rgba(255,255,255,.09);
  --sb-active:rgba(255,255,255,.16);--sb-border:rgba(255,255,255,.1);
  --sb-logo:#2fa82f;
  --bg:var(--mushroom-100);--surface:#fff;--surface2:var(--mushroom-50);
  --border:var(--mushroom-200);--text:var(--mushroom-950);--muted:var(--mushroom-500);
  --subtle:var(--mushroom-400);--brand:var(--kangkong-600);--brand-bg:var(--kangkong-50);
  --radius-sm:4px;--radius:8px;--radius-lg:12px;--radius-xl:16px;
  --shadow-sm:0 1px 2px rgba(0,0,0,.05);
  --shadow:0 1px 4px rgba(0,0,0,.08),0 4px 12px rgba(0,0,0,.05);
  --shadow-md:0 4px 16px rgba(0,0,0,.12);
  --sidebar-w:232px;
}
[data-theme="dark"]{
  --bg:#0d1a0d;--surface:#162416;--surface2:#1e341e;
  --border:#2a432a;--text:#e8f5e8;--muted:#6b9b6b;
  --subtle:#4a7a4a;--brand:var(--kangkong-400);--brand-bg:rgba(46,168,46,.12);
  --sb-bg:#071807;--sb-bg2:#0e360e;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Rubik',system-ui,sans-serif;font-size:14px;min-height:100vh;transition:background .2s,color .2s}
#login-screen{display:none;align-items:center;justify-content:center;min-height:100vh;padding:24px;background:var(--kangkong-950)}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-xl);padding:44px 40px;width:100%;max-width:420px;box-shadow:var(--shadow-md)}
.sprout-logo{display:flex;align-items:center;gap:10px;margin-bottom:28px}
.logo-mark{width:38px;height:38px;background:var(--kangkong-600);border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:15px;flex-shrink:0}
.logo-text{font-size:1.15rem;font-weight:700}.logo-sub{font-size:.78rem;color:var(--muted);margin-top:1px}
.form-label{font-size:.78rem;font-weight:500;color:var(--muted);margin-bottom:5px;display:block}
.form-input{width:100%;background:var(--surface2);border:1.5px solid var(--border);color:var(--text);padding:10px 13px;border-radius:var(--radius);font-size:.9rem;font-family:inherit;outline:none;transition:.15s}
.form-input:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(34,135,34,.12)}
.btn-login{width:100%;background:var(--kangkong-600);color:#fff;border:none;padding:11px;border-radius:var(--radius);cursor:pointer;font-size:.92rem;font-weight:600;font-family:inherit;margin-top:18px;transition:.15s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-login:hover{background:var(--kangkong-700)}.btn-login:disabled{opacity:.6;cursor:not-allowed}
.btn-text-link{background:none;border:none;color:var(--kangkong-400);font-size:.8rem;font-family:inherit;cursor:pointer;padding:0;text-decoration:underline;margin-top:12px;display:block;text-align:center}
.login-error{color:var(--tomato-600);font-size:.8rem;margin-top:10px;padding:9px 12px;background:var(--tomato-100);border-radius:var(--radius-sm)}
.login-success{color:var(--kangkong-700);font-size:.8rem;margin-top:10px;padding:9px 12px;background:var(--kangkong-50);border-radius:var(--radius-sm);border:1px solid var(--kangkong-200)}
.login-spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
.otp-digits{display:flex;gap:8px;justify-content:center;margin:16px 0;flex-wrap:wrap}
.otp-digit{width:44px;height:52px;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--radius);font-size:1.4rem;font-weight:700;text-align:center;color:var(--text);font-family:inherit;outline:none;transition:.15s}
.otp-digit:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(34,135,34,.12)}
.auth-mode-badge{display:inline-flex;align-items:center;gap:5px;font-size:.7rem;font-weight:600;padding:3px 9px;border-radius:20px;margin-bottom:16px}
.auth-mode-badge.otp{background:var(--blueberry-100);color:var(--blueberry-600)}
.auth-mode-badge.password{background:var(--mushroom-200);color:var(--mushroom-600)}
#app{display:none}
.app-shell{display:flex;min-height:100vh}
.sidebar{width:var(--sidebar-w);background:var(--sb-bg);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;overflow:hidden;z-index:30;transition:transform .25s ease}
.sidebar-head{padding:16px;border-bottom:1px solid var(--sb-border);display:flex;align-items:center;gap:10px}
.sb-logo-wrap{width:32px;height:32px;background:var(--sb-logo);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sb-logo-wrap svg{width:18px;height:18px;fill:#fff}
.sb-title{font-size:.88rem;font-weight:700;color:#fff;line-height:1.2}
.sb-subtitle{font-size:.68rem;color:var(--sb-text);margin-top:1px}
.sidebar-nav{flex:1;overflow-y:auto;padding:8px 6px;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.15) transparent}
.sidebar-nav::-webkit-scrollbar{width:4px}
.sidebar-nav::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:4px}
.nav-section{padding:12px 10px 4px;font-size:.6rem;font-weight:700;color:var(--sb-section);text-transform:uppercase;letter-spacing:.1em}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 10px;cursor:pointer;font-size:.83rem;font-weight:500;border-radius:var(--radius);color:var(--sb-text);transition:.12s;margin-bottom:1px;position:relative}
.nav-item:hover{background:var(--sb-hover);color:var(--sb-text-active)}
.nav-item.active{background:var(--sb-active);color:var(--sb-text-active);font-weight:600}
.nav-item.active::before{content:'';position:absolute;left:0;top:20%;bottom:20%;width:3px;background:var(--kangkong-400);border-radius:0 3px 3px 0}
.nav-item .ico{font-size:.9rem;width:18px;text-align:center;flex-shrink:0}
.nav-badge{margin-left:auto;background:var(--tomato-500);color:#fff;font-size:.6rem;font-weight:700;padding:1px 6px;border-radius:20px;min-width:18px;text-align:center;display:none}
.sidebar-user{padding:12px;border-top:1px solid var(--sb-border)}
.user-row{display:flex;align-items:center;gap:9px;margin-bottom:8px}
.avatar{width:30px;height:30px;border-radius:50%;background:var(--kangkong-600);color:#fff;display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:700;flex-shrink:0}
.user-name{font-size:.8rem;font-weight:600;color:#fff}
.user-role{font-size:.68rem;color:var(--sb-text)}
.btn-signout{width:100%;background:transparent;border:1px solid var(--sb-border);color:var(--sb-text);padding:5px;border-radius:var(--radius-sm);cursor:pointer;font-size:.74rem;font-family:inherit;transition:.12s}
.btn-signout:hover{border-color:var(--tomato-500);color:#ff6b6b}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:29}
.sidebar-overlay.open{display:block}
@media(max-width:640px){
  :root{--sidebar-w:220px}
  .sidebar{transform:translateX(-100%)}
  .sidebar.mobile-open{transform:translateX(0)}
  .main{margin-left:0!important}
  .topbar{padding:0 12px}
  .content{padding:12px}
  .mobile-menu-btn{display:flex!important}
  .two-col,.split-col,.trend-grid{grid-template-columns:1fr!important}
  .scorecard-grid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr))!important}
  .login-card{padding:32px 22px}
  .otp-digits{gap:6px}
  .otp-digit{width:38px;height:48px;font-size:1.2rem}
}
@media(min-width:641px) and (max-width:1024px){
  :root{--sidebar-w:210px}
  .content{padding:18px}
  .scorecard-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr))!important}
  .two-col,.split-col{grid-template-columns:1fr 1fr}
  .trend-grid{grid-template-columns:1fr 1fr}
}
@media(min-width:1025px){.mobile-menu-btn{display:none!important}}
.main{margin-left:var(--sidebar-w);min-height:100vh;display:flex;flex-direction:column;transition:margin-left .25s ease}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:54px;position:sticky;top:0;z-index:10}
.topbar h1{font-size:.98rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topbar-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.mobile-menu-btn{display:none;background:transparent;border:1px solid var(--border);color:var(--muted);padding:5px 9px;border-radius:var(--radius-sm);cursor:pointer;font-size:1rem;font-family:inherit;margin-right:4px;align-items:center}
.badge-role{font-size:.68rem;font-weight:600;padding:3px 10px;border-radius:20px;white-space:nowrap}
.badge-manager{background:var(--blueberry-100);color:var(--blueberry-600)}
.badge-se{background:var(--brand-bg);color:var(--brand)}
.badge-ca{background:var(--lavender-100);color:var(--lavender-600)}
.btn-icon{background:transparent;border:1px solid var(--border);color:var(--muted);padding:5px 9px;border-radius:var(--radius-sm);cursor:pointer;font-size:.85rem;font-family:inherit;transition:.12s}
.btn-icon:hover{border-color:var(--brand);color:var(--brand)}
.content{padding:24px;flex:1;max-width:1400px;width:100%}
.page{display:none}.page.active{display:block}
.scorecard-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:22px}
.sc-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;box-shadow:var(--shadow-sm);position:relative;overflow:hidden;display:block;min-width:0;transition:.15s}
.sc-card:hover{box-shadow:var(--shadow)}
.sc-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--sc-color,var(--border))}
.sc-icon{font-size:1.05rem;margin-bottom:8px;display:block}
.sc-label{font-size:.67rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.sc-value{font-size:1.5rem;font-weight:700;line-height:1;color:var(--sc-color,var(--text))}
.sc-sub{font-size:.7rem;color:var(--muted);margin-top:4px}
.sc-green{--sc-color:var(--kangkong-600)}.sc-blue{--sc-color:var(--blueberry-600)}
.sc-yellow{--sc-color:var(--mango-600)}.sc-red{--sc-color:var(--tomato-600)}
.sc-teal{--sc-color:var(--wintermelon-600)}.sc-purple{--sc-color:var(--lavender-600)}
.split-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:18px}
.split-col .section-card{margin-bottom:0}
.section-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:18px;box-shadow:var(--shadow-sm);overflow:hidden}
.section-header{padding:13px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px}
.section-header h3{font-size:.88rem;font-weight:700}.section-meta{font-size:.74rem;color:var(--muted)}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.82rem}
th{background:var(--surface2);padding:8px 14px;text-align:left;font-size:.68rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:10px 14px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}tr:hover td{background:var(--surface2)}
.empty-state{padding:36px;text-align:center;color:var(--muted);font-size:.84rem}
.chip{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:20px;font-size:.7rem;font-weight:600;white-space:nowrap}
.chip-p1{background:var(--tomato-100);color:var(--tomato-600)}.chip-p2{background:var(--carrot-100);color:var(--carrot-500)}
.chip-p3{background:var(--blueberry-100);color:var(--blueberry-600)}.chip-p4{background:var(--mushroom-200);color:var(--mushroom-600)}
.chip-green{background:var(--kangkong-50);color:var(--kangkong-700)}.chip-yellow{background:var(--mango-100);color:var(--mango-600)}
.chip-red{background:var(--tomato-100);color:var(--tomato-600)}.chip-blue{background:var(--blueberry-100);color:var(--blueberry-600)}
.chip-teal{background:var(--wintermelon-100);color:var(--wintermelon-600)}.chip-gray{background:var(--mushroom-200);color:var(--mushroom-600)}
.chip-purple{background:var(--lavender-100);color:var(--lavender-600)}
[data-theme="dark"] .chip-p1{background:rgba(239,68,68,.2)}[data-theme="dark"] .chip-p2{background:rgba(249,115,22,.2)}
[data-theme="dark"] .chip-p3{background:rgba(59,130,246,.2)}[data-theme="dark"] .chip-p4{background:rgba(140,140,128,.2)}
[data-theme="dark"] .chip-green{background:rgba(34,135,34,.2);color:var(--kangkong-300)}
[data-theme="dark"] .chip-blue{background:rgba(59,130,246,.2);color:#93c5fd}
[data-theme="dark"] .chip-yellow{background:rgba(234,179,8,.2);color:#fde68a}
[data-theme="dark"] .chip-teal{background:rgba(13,148,136,.2);color:#99f6e4}
[data-theme="dark"] .chip-purple{background:rgba(124,58,237,.2);color:#c4b5fd}
[data-theme="dark"] .chip-gray{background:rgba(140,140,128,.2);color:var(--muted)}
[data-theme="dark"] .chip-red{background:rgba(239,68,68,.2);color:#fca5a5}
.flag-banner{border-radius:var(--radius-lg);padding:13px 18px;margin-bottom:18px;display:flex;align-items:flex-start;gap:13px}
.flag-banner.yellow{background:var(--mango-100);border:1px solid #fde68a}
[data-theme="dark"] .flag-banner.yellow{background:rgba(234,179,8,.1);border-color:rgba(234,179,8,.3)}
.flag-banner .ico{font-size:1.1rem;flex-shrink:0;margin-top:1px}
.flag-banner h4{font-size:.85rem;font-weight:700;color:var(--mango-600);margin-bottom:2px}
.flag-banner p{font-size:.77rem;color:var(--muted);line-height:1.5}
.jira-widget{display:flex;flex-direction:column}
.jira-row{padding:11px 16px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:10px;transition:.12s}
.jira-row:last-child{border-bottom:none}.jira-row:hover{background:var(--surface2)}
.jira-row.flagged{border-left:3px solid var(--mango-500)}.jira-row.flagged-linked{border-left:3px solid var(--blueberry-500)}
.jira-row.overdue{border-left:3px solid var(--tomato-500);background:rgba(239,68,68,.04)}
.jira-row.due-today{border-left:3px solid var(--mango-500);background:rgba(234,179,8,.04)}
.jira-row.due-soon{border-left:3px solid var(--carrot-500)}
[data-theme="dark"] .jira-row.overdue{background:rgba(239,68,68,.08)}
[data-theme="dark"] .jira-row.due-today{background:rgba(234,179,8,.08)}
.jira-key{font-size:.82rem;font-weight:700;color:var(--brand);text-decoration:none;white-space:nowrap}
.jira-key:hover{text-decoration:underline}
.jira-summary{font-size:.83rem;font-weight:500;margin-bottom:5px;line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.jira-meta{display:flex;align-items:center;flex-wrap:wrap;gap:4px}
.flag-pill{font-size:.67rem;font-weight:700;padding:2px 8px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.flag-comment{background:var(--mango-100);color:var(--mango-600);border:1px solid #fde68a}
.flag-linked{background:var(--blueberry-100);color:var(--blueberry-600);border:1px solid #bfdbfe}
[data-theme="dark"] .flag-comment{background:rgba(234,179,8,.15);border-color:rgba(234,179,8,.3)}
[data-theme="dark"] .flag-linked{background:rgba(59,130,246,.15);border-color:rgba(59,130,246,.3)}
.due-badge{font-size:.67rem;font-weight:700;padding:2px 7px;border-radius:20px;white-space:nowrap}
.due-badge.overdue{background:var(--tomato-100);color:var(--tomato-600)}.due-badge.today{background:var(--mango-100);color:var(--mango-600)}.due-badge.soon{background:var(--carrot-100);color:var(--carrot-500)}
.filter-bar{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:11px 16px;margin-bottom:18px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;box-shadow:var(--shadow-sm)}
.filter-bar label{font-size:.75rem;font-weight:600;color:var(--muted);white-space:nowrap}
.filter-select{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:var(--radius-sm);font-size:.8rem;font-family:inherit;outline:none;min-width:140px}
.mini-spinner{width:12px;height:12px;border:2px solid var(--border);border-top-color:var(--brand);border-radius:50%;animation:spin .6s linear infinite;flex-shrink:0}
.bar-chart-inner{padding:14px 18px}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.bar-label{width:120px;color:var(--muted);font-size:.73rem;text-align:right;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-track{flex:1;background:var(--mushroom-200);border-radius:4px;height:9px;overflow:hidden}
[data-theme="dark"] .bar-track{background:var(--surface2)}
.bar-fill{height:100%;border-radius:4px;transition:width .8s ease}
.bar-val{width:52px;text-align:right;font-size:.72rem;font-weight:600;color:var(--muted);white-space:nowrap}
.tis-pill{display:inline-flex;padding:2px 7px;border-radius:4px;font-size:.7rem;font-weight:600;white-space:nowrap}
.tis-fast{background:var(--kangkong-50);color:var(--kangkong-700)}.tis-mid{background:var(--mango-100);color:var(--mango-600)}.tis-slow{background:var(--tomato-100);color:var(--tomato-600)}
[data-theme="dark"] .tis-fast{background:rgba(34,135,34,.2);color:var(--kangkong-300)}
[data-theme="dark"] .tis-mid{background:rgba(234,179,8,.2);color:#fde68a}
[data-theme="dark"] .tis-slow{background:rgba(239,68,68,.2);color:#fca5a5}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:18px}
.burnout-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.burnout-name{width:80px;font-size:.77rem;font-weight:500;flex-shrink:0}
.burnout-track{flex:1;background:var(--mushroom-200);border-radius:20px;height:10px;overflow:hidden}
[data-theme="dark"] .burnout-track{background:var(--surface2)}
.burnout-fill{height:100%;border-radius:20px}
.burnout-pct{width:34px;font-size:.74rem;font-weight:700;text-align:right;flex-shrink:0}
.insight-card{background:var(--surface2);border-radius:var(--radius);padding:12px 14px;margin-bottom:10px;border-left:3px solid var(--border)}
.insight-card.danger{border-left-color:var(--tomato-500)}.insight-card.warn{border-left-color:var(--mango-500)}.insight-card.ok{border-left-color:var(--kangkong-500)}
.insight-title{font-size:.81rem;font-weight:700;margin-bottom:3px}.insight-body{font-size:.76rem;color:var(--muted);line-height:1.5}
.improve-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
.improve-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:15px;box-shadow:var(--shadow-sm)}
.improve-card.flag-red{border-top:3px solid var(--tomato-500)}.improve-card.flag-yellow{border-top:3px solid var(--mango-500)}

function dueBadge(t){if(t.isOverdue)return'<span class="due-badge overdue">⚠️ Overdue '+t.dueDate+'</span>';if(t.isDueToday)return'<span class="due-badge today">📅 Due Today</span>';if(t.isDueSoon)return'<span class="due-badge soon">⏰ Due '+t.dueDate+'</span>';if(t.dueDate)return'<span style="font-size:.71rem;color:var(--subtle)">📅 '+t.dueDate+'</span>';return'';}

function slugify(s){return s.toLowerCase().replace(/[^a-z0-9]/g,'-');}

function getTodayStr(){var now=new Date(),pht=new Date(now.getTime()+(8*60-now.getTimezoneOffset())*60000),mm=pht.getMonth()+1,dd=pht.getDate();return pht.getFullYear()+'-'+(mm<10?'0'+mm:mm)+'-'+(dd<10?'0'+dd:dd);}
function getCurrentMonthPrefix(){return getTodayStr().slice(0,7);}
function getCurrentYear(){return getTodayStr().slice(0,4);}
function getLastFriday(){var d=new Date(),pht=new Date(d.getTime()+(8*60-d.getTimezoneOffset())*60000),dow=pht.getDay(),diff=dow>=5?dow-5:dow+2;pht.setDate(pht.getDate()-diff);var mm=pht.getMonth()+1,dd=pht.getDate();return pht.getFullYear()+'-'+(mm<10?'0'+mm:mm)+'-'+(dd<10?'0'+dd:dd);}
function isFriday(){var d=new Date(),pht=new Date(d.getTime()+(8*60-d.getTimezoneOffset())*60000);return pht.getDay()===5;}
function getTodaySession(){
  if(!_prod.workLog||!_prod.workLog.entries)return null;
  var today=getTodayStr();
  function normDate(v){if(!v)return'';var s=v.toString().trim();if(/^\d{4}-\d{2}-\d{2}/.test(s))return s.slice(0,10);var d=new Date(s);if(!isNaN(d.getTime())){var mm=d.getMonth()+1,dd=d.getDate();return d.getFullYear()+'-'+(mm<10?'0'+mm:mm)+'-'+(dd<10?'0'+dd:dd);}return s;}
  var entries=_prod.workLog.entries.filter(function(e){return e.email===S.user.email&&(normDate(e.sessionId)===today||normDate(e.date)===today);});
  if(!entries.length)return null;
  var sorted=entries.slice().sort(function(a,b){return a.timestamp.localeCompare(b.timestamp);});
  var last=sorted[sorted.length-1];
  var lastType=(last.entryType||'').toString().trim().toLowerCase();
  var breakOuts=sorted.filter(function(e){return(e.entryType||'').trim().toLowerCase()==='break_out';}).length;
  var breakIns=sorted.filter(function(e){return(e.entryType||'').trim().toLowerCase()==='break_in';}).length;
  return{state:lastType,onBreak:breakOuts>breakIns,entries:sorted,date:today};
}

// ── Client-side week computation (Sat→Fri, capped at current week) ──
function computeClientWeeks(year, month){
  // month is 1-based
  var periodStart=new Date(year,month-1,1);
  var periodEnd=new Date(year,month,0,23,59,59,999);
  var now=new Date();
  var weeks=[],MONTHS_SHORT=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var cursor=new Date(periodStart);
  // Snap back to nearest Saturday (day 6)
  var dow=cursor.getDay(); // 0=Sun
  var diffToSat=(dow===6)?0:-(dow+1);
  cursor.setDate(cursor.getDate()+diffToSat);
  for(var wn=1;wn<=6;wn++){
    var wkSat=new Date(cursor),wkFri=new Date(cursor);
    wkFri.setDate(wkFri.getDate()+6);wkFri.setHours(23,59,59,999);
    // Count weekdays in this month
    var daysThisMonth=0,daysOther=0;
    for(var d=new Date(wkSat);d<=wkFri;d.setDate(d.getDate()+1)){
      var dw=d.getDay();if(dw===0||dw===6)continue;
      if(d.getMonth()===periodStart.getMonth()&&d.getFullYear()===periodStart.getFullYear())daysThisMonth++;
      else daysOther++;
    }
    if(daysThisMonth>=daysOther&&daysThisMonth>0){
      // Cap at current week — if wkSat is in the future, skip
      if(wkSat>now){cursor.setDate(cursor.getDate()+7);continue;}
      var sM=MONTHS_SHORT[wkSat.getMonth()],sD=wkSat.getDate(),eM=MONTHS_SHORT[wkFri.getMonth()],eD=wkFri.getDate();
      var range=sM===eM?sM+' '+sD+'–'+eD:sM+' '+sD+' – '+eM+' '+eD;
      weeks.push({label:'Wk '+wn,range:range,start:wkSat.getTime(),end:wkFri.getTime()});
    }
    cursor.setDate(cursor.getDate()+7);
    if(cursor>periodEnd)break;
  }
  return weeks;
}

function updateCAMonthOpts(){
  var ySel=document.getElementById('ca-filter-year');
  var mSel=document.getElementById('ca-filter-month');
  if(!ySel||!mSel)return;
  var selYear=parseInt(ySel.value,10);
  var curYear=parseInt(getCurrentYear(),10);
  var curMonth=parseInt(getCurrentMonthPrefix().slice(5),10); // yyyy-mm → mm
  var MN=['January','February','March','April','May','June','July','August','September','October','November','December'];
  var maxMonth=selYear===curYear?curMonth:12;
  var curMVal=mSel.value;
  var opts='<option value="all">All months</option>';
  for(var i=1;i<=maxMonth;i++){
    var sel=(curMVal===i.toString())?' selected':'';
    opts+='<option value="'+i+'"'+sel+'>'+MN[i-1]+'</option>';
  }
  mSel.innerHTML=opts;
  // If previously selected month is now out of range, reset
  if(curMVal!=='all'&&parseInt(curMVal,10)>maxMonth){mSel.value='all';}
  updateCAWeekOpts();
}

function updateCAWeekOpts(){
  var ySel=document.getElementById('ca-filter-year');
  var mSel=document.getElementById('ca-filter-month');
  var wSel=document.getElementById('ca-filter-week');
  if(!wSel)return;
  var selYear=ySel?parseInt(ySel.value,10):parseInt(getCurrentYear(),10);
  var selMonth=mSel?mSel.value:'all';
  var curWVal=wSel.value;
  if(selMonth==='all'){
    wSel.innerHTML='<option value="all">All weeks</option>';
    wSel.disabled=true;
    wSel.style.opacity='0.4';
    wSel.style.cursor='not-allowed';
    return;
  }
  wSel.disabled=false;
  wSel.style.opacity='1';
  wSel.style.cursor='pointer';
  var weeks=computeClientWeeks(selYear,parseInt(selMonth,10));
  var opts='<option value="all">All weeks</option>';
  weeks.forEach(function(w){
    var sel=(curWVal===w.label)?' selected':'';
    opts+='<option value="'+w.label+'"'+sel+'>'+w.label+' · '+w.range+'</option>';
  });
  wSel.innerHTML=opts;
  // If previously selected week no longer exists, reset
  if(curWVal!=='all'&&!weeks.find(function(w){return w.label===curWVal;})){wSel.value='all';}
}

// ── SE Workload snapshot tiles ────────────────────────────────
function buildSnapshotTiles(){
  var t=getThreshold();
  var scoreMap={};
  if(_seDailyScores&&_seDailyScores.scores){
    _seDailyScores.scores.forEach(function(s){scoreMap[s.name]={score:s.score,count:s.count};});
  }
  var seList=(_ca.charts&&_ca.charts.seWorkload)?_ca.charts.seWorkload:[];
  var names={};
  seList.forEach(function(se){names[se.name]=true;});
  Object.keys(scoreMap).forEach(function(n){names[n]=true;});
  var allNames=Object.keys(names);
  if(!allNames.length)return'<div class="ca-loading"><div class="mini-spinner"></div> Loading…</div>';
  allNames.sort(function(a,b){
    var sa=scoreMap[a]?scoreMap[a].score:0,sb=scoreMap[b]?scoreMap[b].score:0;
    return sb-sa;
  });
  return allNames.map(function(name){
    var ds=scoreMap[name]||{score:0,count:0};
    var score=ds.score,count=ds.count;
    var status=scoreStatus(score),col=scoreColor(score);
    var topCol=status==='overloaded'?'var(--tomato-500)':status==='high'?'var(--mango-500)':'var(--kangkong-500)';
    var badgeTxt=status==='overloaded'?'Overloaded':status==='high'?'High':'Healthy';
    var badgeCls=status==='overloaded'?'chip-red':status==='high'?'chip-yellow':'chip-green';
    var pct=t.threshold>0?Math.min(Math.round(score/t.threshold*100),100):0;
    return'<div class="se-snap-tile">'+
      '<div class="se-snap-top" style="background:'+topCol+'"></div>'+
      '<div class="se-snap-name">'+name.split(' ')[0]+'</div>'+
      '<div class="se-snap-score" style="color:'+col+'">'+score+'</div>'+
      '<div class="se-snap-sub">'+count+' ticket'+(count!==1?'s':'')+' today</div>'+
      '<div class="se-snap-bar-track"><div class="se-snap-bar-fill" style="width:'+pct+'%;background:'+col+'"></div></div>'+
      '<div style="display:flex;align-items:center;justify-content:space-between;margin-top:5px">'+
        '<span class="chip '+badgeCls+'" style="font-size:.62rem">'+badgeTxt+'</span>'+
        '<span style="font-size:.67rem;color:var(--muted)">'+pct+'%</span>'+
      '</div>'+
    '</div>';
  }).join('');
}

function buildCAInsights(c){
  var ins=[];
  if((c.backlog||0)>15)ins.push(caInsight('warn','⚠','<strong>'+(c.backlog||0)+' tickets</strong> in backlog with no SE assigned yet'));
  else if((c.backlog||0)>0)ins.push(caInsight('ok','📥','<strong>'+(c.backlog||0)+' tickets</strong> queued and awaiting pickup'));
  if(_ca.charts&&_ca.charts.byPriority){var p1=(_ca.charts.byPriority[0]||{}).count||0,p2=(_ca.charts.byPriority[1]||{}).count||0;if(p1+p2>0)ins.push(caInsight(p1>3?'danger':'warn','🔴','<strong>'+(p1+p2)+' urgent tickets</strong> open (P1: '+p1+', P2: '+p2+')'));}
  if((c.awaitingFeedback||0)>0)ins.push(caInsight('info','⏳','<strong>'+(c.awaitingFeedback||0)+' tickets</strong> On Hold — waiting on external feedback'));
  if(_ca.charts&&_ca.charts.seWorkload&&_ca.charts.seWorkload.length){
    var t=getThreshold();
    var overloaded=_ca.charts.seWorkload.filter(function(se){return(se.weightedScore||0)>=t.threshold;}).length;
    var seCount=_ca.charts.seWorkload.length;
    var openTotal=_ca.charts.seWorkload.reduce(function(s,se){return s+(se.total||0);},0);
    var avg=seCount>0?Math.round(openTotal/seCount):0;
    ins.push(overloaded>0
      ?caInsight('danger','🔥','<strong>'+overloaded+' SE'+(overloaded>1?'s are':' is')+'</strong> above auto-threshold ('+t.threshold+') — team may be understaffed')
      :caInsight('ok','👥','<strong>'+seCount+' SEs</strong> handling <strong>'+openTotal+' open tickets</strong> — avg '+avg+' each'));
  }
  return ins.join('');
}

// ── Volume trend — stacked bar ────────────────────────────────
function renderCAVolumeChart(data){
  if(!data.length)return'<div class="ca-chart-card full"><div class="ca-chart-title">Volume trend</div><div class="empty-state" style="padding:30px">No data for selected period.</div></div>';

  var W=660,PT=28,PR=24,PB=56,PL=48,cW=W-PL-PR,cH=110;
  var maxVal=Math.max.apply(null,data.map(function(d){return(d.created||0)+(d.resolved||0);}));
  maxVal=maxVal||1;
  var n=data.length;
  // Evenly distribute bars across the full chart width
  var slotW=cW/n;
  var barW=Math.max(6,Math.min(52,Math.floor(slotW*0.65)));
  var maxLabels=Math.min(10,n);
  var step=n<=maxLabels?1:Math.ceil(n/maxLabels);
  var rotate=n>8;

  // Grid lines at 0, 50%, 100% of max
  var gridVals=[0,Math.round(maxVal*0.5),maxVal];
  var grid=gridVals.map(function(v){
    var y=PT+cH-(v/maxVal)*cH*0.88;
    return'<line x1="'+PL+'" x2="'+(W-PR)+'" y1="'+y.toFixed(1)+'" y2="'+y.toFixed(1)+
      '" stroke="var(--border)" stroke-width="0.5" stroke-dasharray="3,3"/>'+
      '<text x="'+(PL-6)+'" y="'+(y+4).toFixed(1)+'" text-anchor="end" font-size="10" fill="var(--subtle)">'+v+'</text>';
  }).join('');

  // Stacked bars + value labels — bars evenly spaced using slot centres
  var bars=data.map(function(d,i){
    var xCenter=PL+slotW*i+slotW/2;
    var xLeft=(xCenter-barW/2).toFixed(1);
    var created=d.created||0,resolved=d.resolved||0,total=created+resolved;
    var hCreated=total>0?(created/maxVal)*cH*0.88:0;
    var hResolved=total>0?(resolved/maxVal)*cH*0.88:0;
    var yCreated=(PT+cH-hCreated-hResolved).toFixed(1);
    var yResolved=(PT+cH-hResolved).toFixed(1);
    var showLabel=i%step===0||i===n-1;
    // Created bar (top)
    var createdBar=hCreated>0?'<rect x="'+xLeft+'" y="'+yCreated+'" width="'+barW+'" height="'+hCreated.toFixed(1)+'" fill="#378ADD" rx="2"/>':'';
    // Resolved bar (bottom)
    var resolvedBar=hResolved>0?'<rect x="'+xLeft+'" y="'+yResolved+'" width="'+barW+'" height="'+hResolved.toFixed(1)+'" fill="#639922" rx="2"/>':'';
    // Total value label above bar
    var valLabel=total>0&&showLabel?'<text x="'+xCenter.toFixed(1)+'" y="'+(parseFloat(yCreated)-4).toFixed(1)+'" text-anchor="middle" font-size="9" font-weight="600" fill="var(--muted)">'+total+'</text>':'';
    // X-axis label
    var lbl=d.label;if(lbl.length>8)lbl=lbl.slice(0,8);
    var xAxisLabel='';
    if(showLabel){
      var ly=PT+cH+16;
      if(rotate){
        xAxisLabel='<text x="'+xCenter.toFixed(1)+'" y="'+ly+'" text-anchor="end" font-size="9" fill="var(--muted)" transform="rotate(-35,'+xCenter.toFixed(1)+','+ly+')">'+lbl+'</text>';
      } else {
        xAxisLabel='<text x="'+xCenter.toFixed(1)+'" y="'+ly+'" text-anchor="middle" font-size="10" fill="var(--muted)">'+lbl+'</text>'+
          (d.range&&d.range!==d.label?'<text x="'+xCenter.toFixed(1)+'" y="'+(ly+14)+'" text-anchor="middle" font-size="8" fill="var(--subtle)">'+d.range+'</text>':'');
      }
    }
    // Invisible hover rect over full bar height for tooltip
    var hTotal=hCreated+hResolved;
    var yTop=(PT+cH-hTotal).toFixed(1);
    var hoverRect=hTotal>0?'<rect x="'+xLeft+'" y="'+yTop+'" width="'+barW+'" height="'+hTotal.toFixed(1)+'" fill="transparent">'+
      '<title>'+d.label+(d.range&&d.range!==d.label?' ('+d.range+')':'')+
      '&#10;Created: '+created+
      '&#10;Resolved: '+resolved+
      '&#10;Net: '+(created-resolved>=0?'+':'')+(created-resolved)+'</title></rect>':'';
    return createdBar+resolvedBar+valLabel+xAxisLabel+hoverRect;
  }).join('');

  var H=PT+cH+PB;
  var svg='<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 '+W+' '+H+'" style="width:100%;display:block;overflow:visible">'+
    grid+bars+'</svg>';

  var totalCreated=data.reduce(function(s,d){return s+(d.created||0);},0);
  var totalResolved=data.reduce(function(s,d){return s+(d.resolved||0);},0);
  var gap=totalCreated-totalResolved;
  var gapNote=gap>0
    ?'<span style="font-size:.72rem;color:var(--tomato-600);font-weight:600">▲ '+gap+' more created than resolved</span>'
    :'<span style="font-size:.72rem;color:var(--kangkong-600);font-weight:600">✓ Resolved ≥ Created</span>';

  return'<div class="ca-chart-card full">'+
    '<div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:4px">'+
      '<div><div class="ca-chart-title">Volume trend</div>'+
      '<div class="ca-chart-sub">tickets created vs resolved · stacked · filtered period</div></div>'+
      gapNote+'</div>'+
    svg+
    '<div class="ca-legend">'+
      '<div class="ca-leg"><div class="ca-leg-dot" style="background:#378ADD"></div>Created</div>'+
      '<div class="ca-leg"><div class="ca-leg-dot" style="background:#639922"></div>Resolved (For Checking / Done)</div>'+
      '<div style="margin-left:auto;font-size:.7rem;color:var(--subtle)">Total: '+totalCreated+' created · '+totalResolved+' resolved</div>'+
    '</div></div>';
}

// ── SE Workload CHART (filterable, Stats-sheet-based) ─────────
function renderCASEWorkloadChart(data){
  if(!data||!data.length)return'<div class="ca-chart-card"><div class="ca-chart-title">SE workload · period</div><div class="empty-state" style="padding:30px">No resolved tickets in selected period.</div></div>';
  var t=getThreshold(),thresh=t.threshold,warnT=t.warnThreshold;
  var maxScore=Math.max.apply(null,data.map(function(d){return d.weightedScore||0;}).concat([thresh]));
  var threshPct=Math.min(thresh/maxScore*100,100).toFixed(1);
  var warnPct=Math.min(warnT/maxScore*100,100).toFixed(1);
  var overCount=data.filter(function(d){return(d.weightedScore||0)>=thresh;}).length;

  var rows=data.map(function(d){
    var score=d.weightedScore||0,pct=Math.min(score/maxScore*100,100).toFixed(1),col=scoreColor(score),status=scoreStatus(score);
    var badgeTxt=status==='overloaded'?'Overloaded':status==='high'?'High load':'Healthy';
    var badgeCls=status==='overloaded'?'chip-red':status==='high'?'chip-yellow':'chip-green';
    return'<div class="se-wl-row" title="Score: '+score+' | '+d.total+' tickets">'+
      '<div class="se-wl-name" title="'+d.name+'">'+d.name.split(' ')[0]+'</div>'+
      '<div class="se-wl-track">'+
        '<div class="se-wl-fill" style="width:'+pct+'%;background:'+col+'"></div>'+
        '<div class="se-wl-threshold" style="left:'+warnPct+'%;background:var(--mango-500);opacity:.5"></div>'+
        '<div class="se-wl-threshold" style="left:'+threshPct+'%"></div>'+
      '</div>'+
      '<div class="se-wl-count" style="color:'+col+'">'+score+'</div>'+
      '<span class="chip '+badgeCls+'" style="font-size:.62rem;margin-left:4px;flex-shrink:0">'+badgeTxt+'</span>'+
    '</div>';
  }).join('');

  var subtext='Weighted score from Stats sheet · '+data.reduce(function(s,d){return s+d.total;},0)+' total tickets in period';
  var footer='<div class="ca-legend" style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border)">'+
    '<div class="ca-leg"><div class="ca-leg-dot" style="background:#E24B4A"></div>Overloaded (≥'+thresh+')</div>'+
    '<div class="ca-leg"><div class="ca-leg-dot" style="background:#EF9F27"></div>High ('+warnT+'–'+thresh+')</div>'+
    '<div class="ca-leg"><div class="ca-leg-dot" style="background:#1D9E75"></div>Healthy (&lt;'+warnT+')</div>'+
    '<div style="margin-left:auto;display:flex;gap:10px">'+
      '<div style="display:flex;align-items:center;gap:4px;font-size:.7rem;color:var(--muted)"><span style="display:inline-block;width:1.5px;height:12px;background:var(--mango-500);opacity:.6"></span>Warn</div>'+
      '<div style="display:flex;align-items:center;gap:4px;font-size:.7rem;color:var(--muted)"><span style="display:inline-block;width:1.5px;height:12px;background:var(--tomato-500);opacity:.8"></span>Flag</div>'+
    '</div>'+
  '</div>';

  return'<div class="ca-chart-card">'+
    '<div class="ca-chart-title">SE workload · period</div>'+
    '<div class="ca-chart-sub">'+subtext+(overCount>0?' · '+overCount+' SE'+(overCount>1?'s':'')+' above threshold':'')+'</div>'+
    rows+footer+'</div>';
}

    '<div class="sc-card sc-purple"><span class="sc-icon">👥</span><div class="sc-label">Overloaded SEs</div><div class="sc-value" style="color:'+(d.overloadedCount>0?'var(--tomato-600)':'var(--kangkong-600)')+'">'+d.overloadedCount+'</div><div class="sc-sub">score ≥ '+t.threshold+' (auto)</div></div>'+

function renderCapacityTable(capacity){
  if(!capacity||!capacity.length)return'';
  var t=getThreshold(),thresh=t.threshold,warnT=t.warnThreshold;
  var baselineNote=t.fallback
    ?'<div style="padding:8px 18px;font-size:.71rem;color:var(--muted);background:var(--surface2);border-bottom:1px solid var(--border)">⚠ Using default threshold — add more Stats history to auto-compute</div>'
    :'<div style="padding:8px 18px;font-size:.71rem;color:var(--muted);border-bottom:1px solid var(--border)">📊 mean <strong>'+t.mean+'</strong> · σ <strong>'+t.stddev+'</strong> · warn at <strong>'+warnT+'</strong> · flag at <strong>'+thresh+'</strong></div>';
  function scoreSignal(se){
    var s=se.weightedScore||0;
    if(s>=thresh)return'<span class="signal-pill signal-danger">🔴 '+s+'</span><div style="font-size:.67rem;color:var(--muted);margin-top:2px">flag ≥ '+thresh+'</div>';
    if(s>=warnT) return'<span class="signal-pill signal-warn">🟡 '+s+'</span><div style="font-size:.67rem;color:var(--muted);margin-top:2px">warn ≥ '+warnT+'</div>';
    return'<span class="signal-pill signal-ok">🟢 '+s+'</span><div style="font-size:.67rem;color:var(--muted);margin-top:2px">threshold: '+thresh+'</div>';
  }
  function slaSignal(se){
    if(se.slaTotal<=0)return'<span style="color:var(--subtle);font-size:.75rem">No data</span>';
    if(se.isOverloadedSLA)return'<span class="signal-pill signal-danger">🔴 '+fmt2dp(se.slaBreachPct)+'%</span>';
    if(se.slaBreachPct>=CONFIG.OVERLOAD_SLA*0.7)return'<span class="signal-pill signal-warn">🟡 '+fmt2dp(se.slaBreachPct)+'%</span>';
    return'<span class="signal-pill signal-ok">🟢 '+fmt2dp(se.slaBreachPct)+'%</span>';
  }
  function typeTooltip(se){var tb=se.typeBreakdown||{};return Object.keys(tb).map(function(k){return k+': '+tb[k];}).join(' | ')||'No breakdown';}
  var rows=capacity.map(function(se){
    return'<tr style="'+(se.isOverloaded?'background:rgba(239,68,68,.04)':'')+'">'+
      '<td style="font-weight:600">'+se.name+(se.isOverloaded?' <span class="chip chip-red" style="font-size:.62rem">⚠ Overloaded</span>':se.isHighScore?' <span class="chip chip-yellow" style="font-size:.62rem">↑ High</span>':'')+'</td>'+
      '<td title="'+typeTooltip(se)+'">'+scoreSignal(se)+'</td>'+
      '<td style="font-weight:600;color:var(--blueberry-600)">'+(se.workedThisWeek||0)+'</td>'+
      '<td>'+slaSignal(se)+'<div style="font-size:.67rem;color:var(--muted);margin-top:2px">'+(se.slaTotal>0?se.slaMet+'/'+se.slaTotal+' met':'—')+'</div></td>'+
      '<td><span class="chip chip-blue">'+(se.inProgress||0)+'</span></td>'+
      '<td><span class="chip chip-yellow">'+(se.onHold||0)+'</span></td>'+
      '<td><span class="chip chip-purple">'+(se.forPeerReview||0)+'</span></td>'+
      '<td style="font-size:.78rem;color:var(--muted)">'+(se.total||0)+'</td>'+
    '</tr>';
  }).join('');
  return'<div class="section-card" style="margin-bottom:18px">'+
    '<div class="section-header"><h3>🔥 Capacity &amp; Overload Signals</h3><span class="section-meta">Score = weighted sum by ticket type · hover score cell for type breakdown</span></div>'+
    baselineNote+
    '<div class="table-wrap"><table><thead><tr>'+
      '<th>SE Member</th><th>Weighted Score</th><th>Worked This Week</th><th>SLA Breach %</th><th>In Progress</th><th>On Hold</th><th>For Peer Review</th><th>Total Open</th>'+
    '</tr></thead><tbody>'+rows+'</tbody></table></div>'+
    '<div style="padding:10px 18px;font-size:.72rem;color:var(--muted)">🔴 Flag: score ≥ '+thresh+' OR SLA breach ≥ '+CONFIG.OVERLOAD_SLA+'%&nbsp;&nbsp;&nbsp;🟡 Warn: score ≥ '+warnT+'&nbsp;&nbsp;&nbsp;📊 Auto-computed threshold</div>'+
  '</div>';
}

function renderByPriority(byPriority){
  if(!byPriority||!byPriority.length)return'<div class="section-card"><div class="empty-state">No priority data.</div></div>';
  var max=Math.max.apply(null,byPriority.map(function(p){return p.count;}))||1;
  var rows=byPriority.map(function(p){
    return'<div class="bar-row">'+
      '<div class="bar-label">'+p.label+'</div>'+
      '<div class="bar-track"><div class="bar-fill" style="width:'+(p.count/max*100).toFixed(1)+'%;background:'+p.color+'"></div></div>'+
      '<div class="bar-val">'+p.count+' ('+p.pct+'%)</div>'+
    '</div>';
  }).join('');
  return'<div class="section-card"><div class="section-header"><h3>🎯 Open Tickets by Priority</h3></div><div class="bar-chart-inner">'+rows+'</div></div>';
}

function renderFPTTable(tickets,total){

  if(!tickets.length)return header+'<div class="empty-state">No P1/P2 tickets with FPT status.</div></div>';

    var pCls=t.priority==='P1'?'chip-p1':'chip-p2';
    return'<tr>'+
      '<td><a class="jira-key" href="'+t.url+'" target="_blank">'+t.key+'</a></td>'+
      '<td style="max-width:220px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+t.summary+'</td>'+
      '<td><span class="chip '+pCls+'">'+t.priority+'</span></td>'+

function renderWeeklyTrend(trend,weeks){
  if(!weeks.length)return'';
  var labels=weeks.map(function(w){return w.label;});
  var slaData=labels.map(function(l){return trend[l]?trend[l].sla:null;});
  var fcrData=labels.map(function(l){return trend[l]?trend[l].fcr:null;});
  var volData=labels.map(function(l){return trend[l]?trend[l].volume:0;});
  var cycleData=labels.map(function(l){return trend[l]?trend[l].avgCycleMins:null;});
  var leadData=labels.map(function(l){return trend[l]?trend[l].avgLeadMins:null;});
  function miniLine(data,color,width,height,format){
    var vals=data.map(function(v){return v!==null?v:null;});
    var validVals=vals.filter(function(v){return v!==null;});
    if(!validVals.length)return'<div style="color:var(--subtle);font-size:.76rem">No data</div>';
    var min=Math.min.apply(null,validVals),max=Math.max.apply(null,validVals);
    var range=max-min||1;
    var pts=vals.map(function(v,i){var x=(i/(vals.length-1||1))*width;var y=v!==null?(height-4)-((v-min)/range)*(height-8):null;return y!==null?(x.toFixed(1)+','+y.toFixed(1)):null;}).filter(Boolean).join(' ');
    var dots=vals.map(function(v,i){if(v===null)return'';var x=(i/(vals.length-1||1))*width;var y=(height-4)-((v-min)/range)*(height-8);return'<circle cx="'+x.toFixed(1)+'" cy="'+y.toFixed(1)+'" r="3" fill="'+color+'"/><title>'+labels[i]+': '+(format?format(v):v)+'</title>';}).join('');
    var lastVal=validVals[validVals.length-1];
    var fmt=format?format(lastVal):(Math.round(lastVal*10)/10)+'%';
    return'<svg viewBox="0 0 '+width+' '+height+'" style="display:block;width:100%"><polyline points="'+pts+'" fill="none" stroke="'+color+'" stroke-width="2" stroke-linejoin="round"/>'+dots+'</svg><div style="font-size:.82rem;font-weight:700;color:'+color+';margin-top:2px">'+fmt+'</div>';
  }
  function fmtCycle(m){if(!m)return'—';var d=Math.floor(m/1440),h=Math.floor((m%1440)/60);return d?d+'d '+h+'h':h+'h';}
  return'<div class="trend-grid">'+
    '<div class="trend-panel"><div class="trend-panel-title">SLA Compliance</div><div class="trend-panel-avg">Weekly trend · target 95%</div>'+miniLine(slaData,'#1D9E75',300,52,function(v){return v.toFixed(1)+'%';})+'</div>'+
    '<div class="trend-panel"><div class="trend-panel-title">FCR Rate</div><div class="trend-panel-avg">First Contact Resolution</div>'+miniLine(fcrData,'#378ADD',300,52,function(v){return v.toFixed(1)+'%';})+'</div>'+
    '<div class="trend-panel"><div class="trend-panel-title">Volume Closed</div><div class="trend-panel-avg">Tickets resolved per week</div>'+miniLine(volData,'#7c3aed',300,52,function(v){return v+' tickets';})+'</div>'+
    '<div class="trend-panel"><div class="trend-panel-title">Avg Cycle Time</div><div class="trend-panel-avg">Work time per ticket</div>'+miniLine(cycleData,'#EF9F27',300,52,fmtCycle)+'</div>'+
  '</div>';
}

function renderProductivity(){
  var today=getTodayStr(),sessions=(_prod.workLog&&_prod.workLog.sessions)?_prod.workLog.sessions:[];
  var todaySessions=sessions.filter(function(s){return s.date===today&&(!isManager()||s.email===S.user.email);});
  var curSession=todaySessions.length?todaySessions[0]:null;
  var state=curSession?(curSession.complete?'ended':curSession.onBreak?'on_break':curSession.startTime?'started':'idle'):'idle';
  function workBtn(action,label,cls){return'<button class="btn-primary" style="background:'+cls+';margin-right:8px" onclick="logWork(\''+action+'\')">'+label+'</button>';}
  var actionBtns='';
  if(state==='idle')actionBtns=workBtn('start','▶ Start Work','var(--kangkong-600)');
  else if(state==='started')actionBtns=workBtn('break_out','☕ Break','var(--mango-600)')+workBtn('end','⏹ End Work','var(--tomato-600)');
  else if(state==='on_break')actionBtns=workBtn('break_in','▶ Resume','var(--blueberry-600)')+workBtn('end','⏹ End Work','var(--tomato-600)');
  else if(state==='ended')actionBtns='<span style="color:var(--kangkong-600);font-weight:600;font-size:.9rem">✅ Work session complete</span>';
  var statusBadge=state==='idle'?'<span class="chip chip-gray">Idle</span>':state==='started'?'<span class="chip chip-green">Working</span>':state==='on_break'?'<span class="chip chip-yellow">On Break</span>':'<span class="chip chip-blue">Done</span>';
  var sessionInfo='';
  if(curSession){
    sessionInfo='<div style="margin-top:12px;font-size:.82rem;color:var(--muted);display:flex;gap:20px;flex-wrap:wrap">'+
      (curSession.startTime?'<span>⏱ Started: <strong>'+curSession.startTime.slice(11,16)+'</strong></span>':'')+
      (curSession.breakMins>0?'<span>☕ Break: <strong>'+fmtMinsHM(curSession.breakMins)+'</strong></span>':'')+
      (curSession.workMins?'<span>✅ Work time: <strong>'+fmtMinsHM(curSession.workMins)+'</strong></span>':'')+
    '</div>';
  }
  var isManager_=isManager();
  var workHistory='';
  var histSessions=isManager_?sessions:sessions.filter(function(s){return s.email===(S.user&&S.user.email);});
  if(histSessions.length){
    var rows=histSessions.slice(0,14).map(function(s){
      return'<tr>'+
        (isManager_?'<td style="font-size:.78rem">'+s.name+'</td>':'')+'<td>'+s.date+'</td>'+
        '<td style="font-size:.78rem">'+(s.startTime?s.startTime.slice(11,16):'—')+'</td>'+
        '<td style="font-size:.78rem">'+(s.endTime?s.endTime.slice(11,16):'—')+'</td>'+

function logWork(action){
  var notes=(document.getElementById('work-notes')||{}).value||'';
  var today=getTodayStr();
  var params={action:'logworkentry',email:S.user.email,name:S.user.name,entry_type:action,session_id:today,notes:notes};

    return fetchProductivity();
  }).then(function(){renderPage('productivity');}).catch(function(e){alert('Error: '+e.message);});

function renderRTO(){
  var fridayStr=getLastFriday();
  var hasFriday=isFriday();
  var records=(_prod.rto&&_prod.rto.records)?_prod.rto.records:[];
  var fridays=(_prod.rto&&_prod.rto.fridays)?_prod.rto.fridays:[];
  var missedMap=(_prod.rto&&_prod.rto.missedMap)?_prod.rto.missedMap:{};
  var myRecords=isManager()?records:records.filter(function(r){return r.email===(S.user&&S.user.email);});
  var existingEntry=myRecords.find(function(r){return r.rtoDate===fridayStr;});
  var RTO_OPTIONS=[{value:'8:00 AM',label:'8:00 AM'},{value:'8:30 AM',label:'8:30 AM'},
    {value:'9:00 AM',label:'9:00 AM'},{value:'9:30 AM',label:'9:30 AM'},
    {value:'10:00 AM',label:'10:00 AM'},{value:'10:30 AM',label:'10:30 AM'},
    {value:'Other',label:'Other (specify in notes)'}];
  var radioHtml=RTO_OPTIONS.map(function(o){return'<label class="rto-radio-label" id="rto-lbl-'+slugify(o.value)+'">'+'<input type="radio" name="rto-time" value="'+o.value+'" '+(existingEntry&&existingEntry.reportedTime===o.value?'checked':'')+' onchange="updateRTOSelection()"/>'+o.label+'</label>';}).join('');
  var rtoForm='<div style="margin-bottom:18px">'+
    '<div style="font-size:.84rem;font-weight:600;margin-bottom:8px">📅 RTO Log — '+fridayStr+(existingEntry?' <span class="chip chip-green" style="font-size:.68rem">✓ Logged</span>':'')+'</div>'+
    '<div class="rto-radio-group" id="rto-radio-group">'+radioHtml+'</div>'+
    '<div style="margin-top:10px;display:flex;gap:8px;align-items:center;flex-wrap:wrap">'+
      '<input class="prod-input" id="rto-notes" placeholder="Notes (optional)" style="max-width:280px;flex:1" value="'+(existingEntry?existingEntry.notes:'')+'"/>'+
      '<button class="btn-primary" onclick="submitRTO()">Save RTO</button>'+
    '</div>'+
  '</div>';
  var rtoHistory='';
  if(myRecords.length){
    var histRows=myRecords.slice(0,8).map(function(r){
      return'<tr>'+(isManager()?'<td style="font-size:.78rem">'+r.name+'</td>':'')+'<td>'+r.rtoDate+'</td><td style="font-weight:600">'+r.reportedTime+'</td><td style="font-size:.76rem;color:var(--muted)">'+r.notes+'</td></tr>';
    }).join('');
    var histHead=(isManager()?'<th>Name</th>':'')+'<th>Date</th><th>Reported Time</th><th>Notes</th>';
    rtoHistory='<div class="table-wrap"><table><thead><tr>'+histHead+'</tr></thead><tbody>'+histRows+'</tbody></table></div>';
  }
  var missedHtml='';
  if(isManager()&&fridays.length){
    var mRows=fridays.slice(0,4).map(function(fri){var missed=missedMap[fri]||[];return'<tr><td>'+fri+'</td><td>'+(missed.length?'<span class="chip chip-red">'+missed.length+' missing</span>':'<span class="chip chip-green">All submitted</span>')+'</td><td style="font-size:.76rem;color:var(--muted)">'+missed.join(', ')+'</td></tr>';}).join('');
    missedHtml='<div class="section-card" style="margin-top:18px"><div class="section-header"><h3>📊 RTO Compliance</h3></div><div class="table-wrap"><table><thead><tr><th>Friday</th><th>Status</th><th>Missing</th></tr></thead><tbody>'+mRows+'</tbody></table></div></div>';
  }
  return'<div class="section-card" style="margin-top:18px">'+
    '<div class="section-header"><h3>🏢 RTO Log</h3><span class="section-meta">Friday return-to-office tracking</span></div>'+
    '<div style="padding:18px">'+(hasFriday||existingEntry?rtoForm:'<div style="font-size:.83rem;color:var(--muted)">RTO logging is available on Fridays. Last logged Friday: '+fridayStr+'</div>')+rtoHistory+'</div>'+
  '</div>'+missedHtml;
}

function updateRTOSelection(){document.querySelectorAll('.rto-radio-label').forEach(function(lbl){lbl.classList.toggle('selected',lbl.querySelector('input[type=radio]').checked);});}
function submitRTO(){
  var timeEl=document.querySelector('input[name="rto-time"]:checked');
  if(!timeEl){alert('Please select a reported time.');return;}
  var notes=(document.getElementById('rto-notes')||{}).value||'';
  fetch(mwUrl({action:'logrto',email:S.user.email,name:S.user.name,rto_date:getLastFriday(),reported_time:timeEl.value,notes:notes})).then(function(r){return r.json();}).then(function(d){if(!d.success)throw new Error(d.reason||'Failed.');return fetchProductivity();}).then(function(){renderPage('productivity');}).catch(function(e){alert('Error: '+e.message);});
}

function renderMyTickets(){

  var ORDER=['In Progress','On Hold','For Peer Review','To Do','Open','Backlog','New'];
  var html='';
  ORDER.forEach(function(s){
    if(!byStatus[s]||!byStatus[s].length)return;
    html+='<div class="section-card"><div class="section-header"><h3>'+statusChip(s)+'<span style="margin-left:8px">'+s+'</span></h3><span class="section-meta">'+byStatus[s].length+' ticket'+(byStatus[s].length>1?'s':'')+'</span></div><div class="jira-widget">';

        '</div>'+

function renderFlagged(){
  var flagged=S.flaggedTickets||[];
  if(!flagged.length)return'<div class="section-card"><div class="empty-state" style="padding:60px">🎉 No tickets need updates right now.</div></div>';
  var html='<div class="flag-banner yellow"><span class="ico">⚠️</span><div><h4>'+flagged.length+' ticket'+(flagged.length>1?'s need':'needs')+' your attention</h4><p>These tickets have new replies or linked updates waiting for your action.</p></div></div>';
  html+='<div class="section-card"><div class="jira-widget">';
  flagged.forEach(function(t){
    var flags=t.flags||[];
    var hasComment=flags.some(function(f){return f.type==='comment';});
    var linkedFlags=flags.filter(function(f){return f.type==='linked';});
    var rowCls=hasComment&&linkedFlags.length?'jira-row flagged':hasComment?'jira-row flagged':linkedFlags.length?'jira-row flagged-linked':'jira-row';
    html+='<div class="'+rowCls+'">'+
      '<a class="jira-key" href="'+t.url+'" target="_blank">'+t.key+'</a>'+
      '<div style="flex:1;min-width:0">'+
        '<div class="jira-summary">'+t.summary+'</div>'+
        '<div class="jira-meta">'+prioChip(t.priority)+statusChip(t.status)+
          (hasComment?'<span class="flag-pill flag-comment">💬 New Feedback</span>':'')+
          linkedFlags.map(function(f){return'<span class="flag-pill flag-linked">'+f.label+'</span>';}).join('')+
        '</div>'+
      '</div>'+
    '</div>';
  });
  html+='</div></div>';

function renderBacklog(){

  var overdue=all.filter(function(t){return t.isOverdue;});
  var dueBanner=overdue.length?'<div class="flag-banner yellow"><span class="ico">⚠️</span><div><h4>'+overdue.length+' overdue backlog ticket'+(overdue.length>1?'s':'')+'</h4><p>These items have passed their due date and need urgent assignment.</p></div></div>':'';
  function section(title,tickets){
    if(!tickets.length)return'';
    var rows=tickets.map(function(t){
      return'<div class="'+attentionCls(t)+'">'+
        '<a class="jira-key" href="'+t.url+'" target="_blank">'+t.key+'</a>'+
        '<div style="flex:1;min-width:0">'+
          '<div class="jira-summary">'+t.summary+'</div>'+
          '<div class="jira-meta">'+prioChip(t.priority)+'<span class="chip chip-gray">'+t.issueType+'</span>'+dueBadge(t)+(t.product&&t.product!=='—'?'<span style="font-size:.71rem;color:var(--subtle)">'+t.product+'</span>':'')+'</div>'+
        '</div>'+

function renderTISStats(){
  var data=isManager()?null:_seTISStats;
  if(!data)return'';
  if(data.error)return'<div class="section-card"><div class="empty-state">TIS data unavailable.</div></div>';
  var STATUSES=['In Progress','On Hold','For Peer Review','For Checking'];
  var STATUS_COLORS={'In Progress':'#378ADD','On Hold':'#EF9F27','For Peer Review':'#7c3aed','For Checking':'#1D9E75'};
  var avgRows=STATUSES.map(function(s){
    var mins=data.avgByStatus[s];if(!mins)return'';
    var color=STATUS_COLORS[s]||'#888780';
    var cls=mins<60*CONFIG.TIS_THRESHOLDS.fast?'tis-fast':mins<60*CONFIG.TIS_THRESHOLDS.slow?'tis-mid':'tis-slow';
    return'<div class="bar-row">'+
      '<div class="bar-label" style="color:'+color+'">'+s+'</div>'+
      '<div class="bar-track"><div class="bar-fill" style="width:'+Math.min(mins/180*100,100).toFixed(1)+'%;background:'+color+'"></div></div>'+
      '<div class="bar-val"><span class="tis-pill '+cls+'">'+fmtMinsHM(mins)+'</span></div>'+
    '</div>';
  }).filter(Boolean).join('');
  var candidates=data.candidates||[];
  var candHtml=candidates.length?candidates.map(function(c){
    var pcts=STATUSES.map(function(s){var m=c.statusAvgMins[s]||0;return{status:s,mins:m,pct:c.avgTotalMins>0?Math.min(m/c.avgTotalMins*100,100).toFixed(1):0,color:STATUS_COLORS[s]||'#888780'};});
    return'<div class="improve-card '+(c.avgTotalMins>60*CONFIG.TIS_THRESHOLDS.slow?'flag-red':'flag-yellow')+'">'+
      '<div class="ic-header"><div><div class="ic-title">'+c.issueType+'</div><div class="ic-meta">'+(c.label!=='(no label)'?c.label:'')+'</div></div>'+
      '<div><div class="ic-stat-val">'+fmtMinsHM(c.avgTotalMins)+'</div><div class="ic-stat-label">avg total</div></div></div>'+
      pcts.filter(function(p){return p.mins>0;}).map(function(p){return'<div class="ic-bar-row"><div class="ic-bar-label">'+p.status+'</div><div class="ic-bar-track"><div class="ic-bar-fill" style="width:'+p.pct+'%;background:'+p.color+'"></div></div><div class="ic-bar-val">'+fmtMinsHM(p.mins)+'</div></div>';}).join('')+
    '</div>';
  }).join(''):'<div style="color:var(--subtle);font-size:.82rem">No patterns identified yet.</div>';
  return'<div class="section-card"><div class="section-header"><h3>⏱ Time in Status</h3><span class="section-meta">Average time spent per status</span></div>'+
    '<div class="bar-chart-inner">'+avgRows+'</div></div>'+
    (candidates.length?'<div class="section-card"><div class="section-header"><h3>🔍 Longest-Hanging Issue Types</h3></div><div style="padding:14px 18px"><div class="improve-grid">'+candHtml+'</div></div></div>':'');
}

    '<label style="font-size:.75rem;font-weight:600;color:var(--muted)">Year</label>'+
    '<select id="inc-year" class="filter-select" onchange="renderPage(\'incidents\')">'+yearOpts+'</select>'+
    '<label style="font-size:.75rem;font-weight:600;color:var(--muted)">Month/Week</label>'+
    '<select id="inc-mw" class="filter-select" onchange="renderPage(\'incidents\')">'+mwOpts+'</select>'+
    '<span style="font-size:.72rem;color:var(--muted)">'+filtered.length+' incident'+(filtered.length!==1?'s':'')+'</span>'+
  '</div>';
  if(!filtered.length)return filterBar+'<div class="section-card"><div class="empty-state">No incidents for selected period.</div></div>';
  var grouped={};
  filtered.forEach(function(inc){var k=inc.category||'Uncategorized';if(!grouped[k])grouped[k]=[];grouped[k].push(inc);});
  var html=filterBar;
  Object.keys(grouped).sort().forEach(function(cat){
    var items=grouped[cat];
    var rows=items.map(function(inc){
      return'<div class="inc-row">'+
        '<div class="inc-key-col"><a class="jira-key" href="'+inc.url+'" target="_blank">'+inc.key+'</a>'+
          '<div style="margin-top:4px;display:flex;flex-direction:column;gap:3px">'+
            (inc.type?'<span class="chip '+(inc.type.toLowerCase().includes('kudos')?'chip-green':inc.type.toLowerCase().includes('escalat')?'chip-red':'chip-yellow')+'" style="font-size:.64rem">'+inc.type+'</span>':'')+
          '</div>'+
        '</div>'+
        '<div class="inc-body">'+
          '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:4px">'+
            (inc.issueType?'<span class="chip chip-gray" style="font-size:.7rem">'+inc.issueType+'</span>':'')+
            (inc.monthWeek?'<span style="font-size:.7rem;color:var(--muted)">'+inc.monthWeek+'</span>':'')+
            (isManager()&&inc.assignedSE?'<span style="font-size:.7rem;font-weight:600">'+inc.assignedSE+'</span>':'')+
          '</div>'+
          (inc.feedback?'<div class="inc-feedback">'+inc.feedback+'</div>':'')+
          (inc.doc?'<a href="'+inc.doc+'" target="_blank" class="inc-doc-link">📄 Process doc</a>':'')+
        '</div>'+
      '</div>';
    }).join('');
    html+='<div class="section-card"><div class="section-header"><h3>'+cat+'</h3><span class="section-meta">'+items.length+'</span></div>'+rows+'</div>';
  });
  return html;
}

function computeTIS(){if(S.stTickets){S.analytics=S.analytics||{};}}
function buildAnalyticsFromTickets(tickets){
  var byStatus={},bySE={};
  tickets.forEach(function(t){
    var s=t.status||'Other';if(!byStatus[s])byStatus[s]=0;byStatus[s]++;
    var se=t.assignedSE||t.assigneeName||'Unassigned';if(!bySE[se])bySE[se]={total:0};bySE[se].total++;
  });
  return{teamStats:{byStatus:byStatus,bySE:bySE,totalOpen:tickets.length}};
}

function renderAnalytics(){
  var data=getAnalytics();
  if(!data)return'<div class="section-card"><div class="empty-state">Loading analytics…</div></div>';
  var byStatus=data.byStatus||{};
  var bySE=data.bySE||{};
  var totalOpen=data.totalOpen||0;
  var ORDER=['In Progress','On Hold','For Peer Review','To Do','Backlog','Open','New','For Checking','For Product Team'];
  var statusHtml='<div class="section-card"><div class="section-header"><h3>📊 Open Tickets by Status</h3><span class="section-meta">'+totalOpen+' total open</span></div><div class="bar-chart-inner">';
  var statusMax=Math.max.apply(null,Object.values(byStatus).concat([1]));
  ORDER.concat(Object.keys(byStatus).filter(function(k){return ORDER.indexOf(k)===-1;})).forEach(function(s){
    var v=byStatus[s];if(!v)return;
    var col=s==='In Progress'?'var(--blueberry-500)':s==='On Hold'?'var(--tomato-500)':s==='For Peer Review'?'var(--lavender-600)':s==='For Checking'?'var(--mango-500)':'var(--mushroom-400)';
    statusHtml+='<div class="bar-row"><div class="bar-label">'+s+'</div><div class="bar-track"><div class="bar-fill" style="width:'+(v/statusMax*100).toFixed(1)+'%;background:'+col+'"></div></div><div class="bar-val">'+v+'</div></div>';
  });
  statusHtml+='</div></div>';
  var seEntries=Object.keys(bySE).map(function(k){return{name:k,total:bySE[k].total};}).sort(function(a,b){return b.total-a.total;});
  var seMax=seEntries.length?seEntries[0].total:1;
  var t=getThreshold(),thresh=t.threshold,warnT=t.warnThreshold;
  var seHtml='<div class="section-card"><div class="section-header"><h3>👥 Open Tickets per SE</h3></div><div class="bar-chart-inner">';
  seEntries.forEach(function(se){
    var col=se.total>=thresh?'var(--tomato-500)':se.total>=warnT?'var(--mango-500)':'var(--kangkong-600)';
    seHtml+='<div class="bar-row"><div class="bar-label">'+se.name.split(' ')[0]+'</div><div class="bar-track"><div class="bar-fill" style="width:'+(se.total/seMax*100).toFixed(1)+'%;background:'+col+'"></div></div><div class="bar-val">'+se.total+'</div></div>';
  });
  seHtml+='</div></div>';
  return'<div class="split-col">'+statusHtml+seHtml+'</div>';
}

function renderReporting(){
  if(!isManager())return'<div class="section-card"><div class="empty-state">Access restricted.</div></div>';
  var d=S.mgrOverview;
  if(!d)return'<div class="section-card"><div class="empty-state">Load the overview first.</div></div>';
  var csv='SE Member,Weighted Score,Score Status,SLA Breach %,In Progress,On Hold,For Review,Total Open,Worked This Week\n';
  (d.capacity||[]).forEach(function(c){csv+='"'+c.name+'",'+c.weightedScore+','+c.scoreStatus+','+Math.max(0,c.slaBreachPct).toFixed(2)+','+c.inProgress+','+c.onHold+','+c.forPeerReview+','+c.total+','+c.workedThisWeek+'\n';});
  var blob='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  return'<div class="section-card"><div class="section-header"><h3>📋 Reports</h3><a href="'+blob+'" download="capacity-report.csv" class="btn-primary">⬇ Download CSV</a></div>'+
    '<div style="padding:18px;font-size:.82rem;color:var(--muted)">Capacity report · '+d.monthLabel+' · '+d.generatedAt.slice(0,10)+'</div>'+
    '<div class="table-wrap"><table><thead><tr><th>SE Member</th><th>Score</th><th>Status</th><th>SLA Breach%</th><th>In Progress</th><th>On Hold</th><th>For Review</th><th>Total Open</th><th>Worked/Week</th></tr></thead><tbody>'+
    (d.capacity||[]).map(function(c){return'<tr><td>'+c.name+'</td><td style="font-weight:700;color:'+scoreColor(c.weightedScore||0)+'">'+c.weightedScore+'</td><td><span class="chip '+(c.scoreStatus==='overloaded'?'chip-red':c.scoreStatus==='high'?'chip-yellow':'chip-green')+'">'+c.scoreStatus+'</span></td><td>'+Math.max(0,c.slaBreachPct).toFixed(1)+'%</td><td>'+c.inProgress+'</td><td>'+c.onHold+'</td><td>'+c.forPeerReview+'</td><td>'+c.total+'</td><td>'+c.workedThisWeek+'</td></tr>';}).join('')+
    '</tbody></table></div></div>';
}

function renderReferences(){
  var refs=CONFIG.REFERENCE_LINKS||[];
  if(!refs.length)return'<div class="section-card"><div class="empty-state">No reference links loaded yet.</div></div>';
  var groups={};
  refs.forEach(function(r){var g=r.tag||'Other';if(!groups[g])groups[g]=[];groups[g].push(r);});
  var html='';
  Object.keys(groups).sort().forEach(function(g){
    var items=groups[g];
    html+='<div class="ref-section"><div class="ref-section-header"><span class="ref-section-title">'+g+'</span><span class="ref-section-count">'+items.length+'</span></div><div class="ref-grid">'+
      items.map(function(r){return'<a class="ref-card" href="'+r.url+'" target="_blank"><div class="ref-icon-wrap">'+(r.icon||tagIcon(r.tag||''))+'</div><div><div class="ref-name">'+r.name+'</div><div class="ref-desc">'+r.description+'</div><span class="ref-tag">'+r.tag+'</span></div></a>';}).join('')+
    '</div></div>';
  });
  return html;
}
